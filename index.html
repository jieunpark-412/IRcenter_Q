
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한국공대 학습경험 Q설문조사</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: #ffffff;
      --panel2: #fffaf0;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d7dce2;
      --line2: #c4cbd4;
      --primary: #0d6efd;
      --primary-dark: #0b5ed7;
      --danger: #ef4444;
      --green: #16a34a;
      --shadow: 0 1px 6px rgba(15, 23, 42, 0.12);
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
      transition: transform 0.04s ease, background 0.15s ease, opacity 0.15s ease;
    }

    button:hover { background: #d1d5db; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger { background: #fee2e2; color: #991b1b; }
    .btn-danger:hover { background: #fecaca; }
    .btn-light { background: #f3f4f6; }
    .btn-small { padding: 6px 8px; font-size: 12px; }

    .app-shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 10px 20px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 8px rgba(15, 23, 42, 0.06);
    }

    .stepper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 14px 10px;
      flex-wrap: wrap;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #9ca3af;
      color: #fff;
      font-size: 14px;
    }

    .step-item.active { color: var(--primary); }
    .step-item.active .step-num { background: var(--primary); }
    .step-divider { color: #c4c4c4; }

    .main-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 12px;
    }

    .title-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    h1, h2, h3 { margin: 0 0 10px; line-height: 1.25; }
    h1 { font-size: 24px; }
    h2 { font-size: 22px; }
    h3 { font-size: 17px; }

    .muted { color: var(--muted); }
    .strong { font-weight: 800; }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .info-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .info-box.soft {
      background: var(--panel2);
      border-color: #f1dba5;
    }

    .quota-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
      overflow: hidden;
      border-radius: 8px;
    }

    .quota-table th,
    .quota-table td {
      border: 1px solid #e5e7eb;
      padding: 8px 9px;
      text-align: center;
      white-space: nowrap;
    }

    .quota-table th { background: #f9fafb; }

    .intro-list {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }

    .input {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .actions.center { justify-content: center; }

    .pre-layout {
      display: grid;
      grid-template-columns: 320px repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .pre-pool,
    .pre-bucket {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 520px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .pre-bucket.disagree { background: #fff5f5; }
    .pre-bucket.neutral { background: #fbfbfb; }
    .pre-bucket.agree { background: #f0fdf4; }

    .bucket-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      border-radius: 999px;
      padding: 0 8px;
      background: #e5e7eb;
      color: #111827;
      font-size: 12px;
      font-weight: 800;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 660px;
      overflow: auto;
      padding-right: 3px;
    }

    .q-card {
      border: 1px solid #b8c7d9;
      background: linear-gradient(180deg, #f8fbff, #eef6ff);
      border-radius: 8px;
      padding: 9px 10px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }

    .q-card:active { cursor: grabbing; }
    .q-card.dragging { opacity: 0.5; }
    .q-card.selected {
      outline: 3px solid rgba(13, 110, 253, 0.35);
      border-color: var(--primary);
    }

    .q-card .qid {
      font-weight: 900;
      margin-bottom: 3px;
    }

    .q-card .qtext {
      font-size: 13px;
      line-height: 1.45;
      word-break: keep-all;
    }

    .pre-card-actions {
      display: flex;
      gap: 5px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .qsort-layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 12px;
    }

    .side-panel {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      min-height: 620px;
    }

    .selected-hint {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .qdist-summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .score-grid-wrap {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      overflow-x: auto;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(104px, 1fr));
      gap: 8px;
      min-width: 980px;
    }

    .score-col {
      min-width: 104px;
    }

    .score-head {
      border: 1px solid var(--line);
      border-radius: 8px 8px 0 0;
      text-align: center;
      padding: 9px 6px;
      font-weight: 900;
      min-height: 78px;
    }

    .score-head.negative { background: linear-gradient(180deg, #fecaca, #fee2e2); }
    .score-head.neutral { background: linear-gradient(180deg, #e5e7eb, #f3f4f6); }
    .score-head.positive { background: linear-gradient(180deg, #bbf7d0, #dcfce7); }

    .quota-label {
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      min-height: 96px;
      font-weight: 600;
      color: #374151;
    }

    .score-head.quota-full .quota-label { color: #166534; }
    .score-head.quota-open .quota-label { color: #6b7280; }

    .slots {
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      border-radius: 0 0 8px 8px;
      padding: 8px;
      background: #fcfcfc;
      min-height: 465px;
    }

    .slot {
      min-height: 48px;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.75);
      transition: background 0.12s ease, border-color 0.12s ease;
      padding: 4px;
    }

    .slot:last-child { margin-bottom: 0; }
    .slot.drag-over { background: #eff6ff; border-color: var(--primary); }
    .slot .slot-card {
      width: 100%;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      background: #fff;
      font-weight: 900;
      cursor: grab;
      padding: 7px 4px;
      text-align: center;
    }

    .slot .slot-card.selected {
      border-color: var(--primary);
      outline: 3px solid rgba(13, 110, 253, 0.25);
    }

    .slot-empty-text {
      color: #9ca3af;
      font-size: 12px;
    }

    .pool-drop {
      border: 2px dashed transparent;
      border-radius: 10px;
      padding: 4px;
      min-height: 160px;
    }

    .pool-drop.drag-over {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .bottom-tip {
      background: #fff8db;
      border: 1px solid #f2d675;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 12px;
      color: #6b4e00;
      font-size: 14px;
    }

    .review-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .extreme-list {
      display: grid;
      gap: 10px;
    }

    .comment-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
    }

    .comment-box textarea {
      width: 100%;
      min-height: 80px;
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
    }

    .survey-notice {
      background: #fff7ed;
      border-color: #fed7aa;
    }

    .notice-lines p {
      margin: 6px 0;
    }

    .required-mark {
      color: #dc2626;
      font-weight: 900;
    }

    .checkbox-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border: 1px solid #d7dce2;
      border-radius: 10px;
      background: #ffffff;
      margin: 10px 0;
      cursor: pointer;
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 3px;
      flex: 0 0 auto;
    }

    .field-help {
      margin-top: 6px;
      font-size: 13px;
      color: #6b7280;
    }

    .privacy-box {
      margin-top: 12px;
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .range-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
      background: #eef2ff;
      color: #3730a3;
      white-space: nowrap;
    }

    .pre-quota-status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .pre-quota-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      font-size: 13px;
    }

    .pre-quota-card.ok { border-color: #86efac; background: #f0fdf4; }
    .pre-quota-card.warn { border-color: #facc15; background: #fefce8; }
    .pre-quota-card.over { border-color: #fca5a5; background: #fff5f5; }

    .badge.ok { background: #dcfce7; color: #166534; }
    .badge.warn { background: #fef9c3; color: #854d0e; }
    .badge.over { background: #fee2e2; color: #991b1b; }

    .bucket-section {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
    }

    .bucket-section.disagree { background: #fff5f5; }
    .bucket-section.neutral { background: #fbfbfb; }
    .bucket-section.agree { background: #f0fdf4; }

    .bucket-section .card-list {
      max-height: 240px;
    }

    .locked-rule-note {
      margin-top: 6px;
      font-size: 12px;
      color: #4b5563;
    }

    .choice-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
    }

    .choice-section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .choice-section.disagree { background: #fff7f7; }
    .choice-section.neutral { background: #fbfbfb; }
    .choice-section.agree { background: #f4fff7; }

    .choice-section-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .choice-card {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(300px, 0.95fr);
      gap: 12px;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.88);
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .choice-card:last-child { margin-bottom: 0; }

    .choice-card-text .qid {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .choice-card-text .qtext {
      font-size: 14px;
      line-height: 1.45;
      word-break: keep-all;
    }

    .choice-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 7px;
    }

    .choice-btn {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #111827;
      border-radius: 9px;
      padding: 9px 8px;
      min-height: 82px;
      font-weight: 900;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .choice-btn:hover { background: #e0f2fe; }

    .choice-btn.selected {
      background: var(--primary);
      border-color: var(--primary-dark);
      color: #fff;
    }

    .choice-btn .remain {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      font-weight: 700;
      opacity: 0.82;
    }

    .choice-btn:disabled:not(.selected) {
      background: #e5e7eb;
      color: #6b7280;
      border-color: #d1d5db;
      cursor: not-allowed;
    }

    .choice-progress-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(102px, 1fr));
      gap: 6px;
      width: 100%;
    }

    .choice-progress-cell {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      line-height: 1.35;
      min-height: 96px;
    }

    .choice-progress-cell.ok {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .choice-progress-cell.warn {
      border-color: #facc15;
      background: #fefce8;
      color: #854d0e;
    }

    .score-num {
      display: block;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.15;
    }

    .score-desc {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
      word-break: keep-all;
    }

    .choice-btn .score-num {
      font-size: 18px;
    }

    .choice-btn .score-desc {
      min-height: 30px;
    }

    .choice-progress-cell .score-desc {
      color: inherit;
      opacity: 0.92;
    }

    .score-meaning-box {
      margin-top: 12px;
    }

    .score-legend-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(92px, 1fr));
      gap: 8px;
      width: 100%;
    }

    .score-legend-grid.compact {
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    }

    .score-legend-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 9px 8px;
      text-align: center;
      min-height: 74px;
    }

    .score-legend-card.negative { background: #fff7f7; border-color: #fecaca; }
    .score-legend-card.neutral { background: #fbfbfb; border-color: #d1d5db; }
    .score-legend-card.positive { background: #f4fff7; border-color: #bbf7d0; }

    .quota-score-cell {
      min-width: 96px;
      line-height: 1.25;
    }

    .quota-score-cell .score-desc {
      font-size: 11px;
      color: #4b5563;
    }


    @media (max-width: 900px) {
      .choice-card { grid-template-columns: 1fr; }
      .choice-progress-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .score-legend-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      max-width: 420px;
      z-index: 100;
      padding: 12px 14px;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.22);
      display: none;
    }

    .toast.show { display: block; }

    .loading-cover {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(3px);
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #111827;
    }

    .loading-cover.show { display: flex; }

    @media (max-width: 1100px) {
      .grid-3, .review-grid { grid-template-columns: 1fr; }
      .pre-layout { grid-template-columns: 1fr; }
      .qsort-layout { grid-template-columns: 1fr; }
      .side-panel { min-height: auto; }
      .card-list { max-height: 360px; }
    }

    @media print {
      .topbar, .actions, .bottom-tip, .side-panel { display: none !important; }
      body { background: #fff; }
      .main-panel, .score-grid-wrap, .info-box { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div id="stepper" class="stepper"></div>
  </div>

  <main class="app-shell">
    <div id="app"></div>
  </main>

  <div id="toast" class="toast"></div>
  <div id="loading" class="loading-cover">처리 중입니다...</div>

  <script>
    /**********************************************************************
     * 1. 반드시 수정할 설정값
     **********************************************************************/

    const STUDY_TITLE = "한국공대 학습경험 Q설문조사";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbW1evpcf0PqyJcb57YqnZX65e2K_NCv_XPto4r2wBun7EdqUKaN3K708BR2klxBbJIg/exec";

    // Apps Script에 action=checkStudentId JSONP 중복확인 기능을 넣은 경우 true.
    // 해당 기능을 아직 넣지 않았다면 false로 바꾸세요.
    const CHECK_DUPLICATE_BEFORE_SUBMIT = false;

    // 제출 오류 방지를 위해 기본 제출 방식은 hidden form + iframe으로 설정합니다.
    // 이 방식은 CORS/fetch 리다이렉트 오류를 피하면서 Apps Script doPost(e)로 데이터를 보냅니다.
    const SUBMIT_TRANSPORT = "hidden_form";

    // 제출 시 응답 데이터를 브라우저 localStorage에도 임시 저장합니다.
    const SAVE_LOCAL_BACKUP_ON_SUBMIT = true;

    // 학번 입력 필수 여부.
    const REQUIRE_STUDENT_ID = true;

    // 40문항 권장 강제분포: 2-3-5-6-8-6-5-3-2.
    const SCORE_COLUMNS = [
      { score: -4, count: 2, description: "전혀 동의하지 않는다" },
      { score: -3, count: 3, description: "매우 동의하지 않는다" },
      { score: -2, count: 5, description: "동의하지 않는다" },
      { score: -1, count: 6, description: "약간 동의하지 않는다" },
      { score: 0, count: 8, description: "중립" },
      { score: 1, count: 6, description: "약간 동의한다" },
      { score: 2, count: 5, description: "동의한다" },
      { score: 3, count: 3, description: "매우 동의한다" },
      { score: 4, count: 2, description: "전적으로 동의한다" }
    ];

    // true이면 예비분류 결과가 배치 가능 점수 범위를 고정합니다.
    // 비동의 후보: -4~-1, 중립 후보: 0, 동의 후보: +1~+4 안에서만 배치할 수 있습니다.
    const LOCK_PLACEMENT_TO_PRE_CLASSIFICATION = true;

    // 아래 40개 문항을 실제 연구 문항으로 교체하세요.
    // id는 반드시 1부터 40까지 중복 없이 유지하는 것을 권장합니다.
    const STATEMENTS = [
      { id: 1, text: "문항 1: 최근 수업 진도를 따라가기 어려워 결석하거나 과제를 미루는 일이 잦아졌다." },

      { id: 3, text: "문항 3: 성적이 낮아질수록 이 학교에서 버틸 수 있을지 자신감이 떨어진다." },
      { id: 4, text: "문항 4: 학교에서 작은 성취감도 잘 느끼지 못해 재학의 의미가 약해지고 있다." },
      { id: 5, text: "문항 5: 지금 배우는 내용이 내 미래 진로와 연결된다고 느껴지지 않는다." },
      { id: 6, text: "문항 6: 전공이나 학과가 내 흥미·적성·생활방식과 맞지 않는다고 느낀다." },
      { id: 7, text: "문항 7: 수업보다 아르바이트·실습·현장 경험이 내 미래에 더 도움이 된다고 느낀다." },
      { id: 8, text: "문항 8: 대학 생활의 규칙과 리듬(출석, 과제, 팀활동)에 적응하는 것이 어렵다." },
      { id: 9, text: "문항 9: 졸업해도 원하는 일자리를 얻을 수 있을지 확신이 없어 학업 의욕이 줄어든다." },
      { id: 10, text: "문항 10: 지금 학교에 남는 것보다 다른 진로를 바로 준비하는 편이 현실적이라고 느낀다." },
      { id: 11, text: "문항 11: 무엇을 목표로 대학을 다니는지 분명하지 않아 계속 다녀야 할 이유가 약해진다." },
      { id: 12, text: "문항 12: 빨리 돈을 벌거나 경력을 쌓는 것이 학업을 계속하는 것보다 더 시급하다." },
      { id: 13, text: "문항 13: 학위보다 자격증, 포트폴리오, 실무경험이 내게 더 중요하다고 느낀다." },
      { id: 14, text: "문항 14: 졸업장이 내 삶을 크게 바꿔줄 것 같지 않아 재학 동기가 약해진다." },
      { id: 15, text: "문항 15: 대학에 머무는 동안 오히려 진로 결정이 늦어지고 있다고 느낀다." },
      { id: 16, text: "문항 16: 등록금, 생활비, 교통비 등 비용 부담 때문에 학업을 계속하기 어렵다." },
      { id: 17, text: "문항 17: 가족이나 나의 경제 상황을 생각하면 학교보다 생계가 우선이라고 느낀다." },
      { id: 18, text: "문항 18: 대학에 쓰는 시간과 비용에 비해 얻는 것이 적다고 느낀다." },
      { id: 19, text: "문항 19: 아르바이트나 취업 준비 때문에 수업·과제에 충분히 집중하기 어렵다." },
      { id: 20, text: "문항 20: 장학금·생활비·학업지원이 더 현실적으로 제공된다면 계속 다닐 수 있을 것 같다." },
      { id: 21, text: "문항 21: 최근 지치고 무기력해서 수업이나 학교생활을 시작하는 것 자체가 부담스럽다." },
      { id: 22, text: "문항 22: 스트레스가 누적되어 학교를 잠시 멈추거나 떠나고 싶다는 생각이 든다." },
      { id: 23, text: "문항 23: 학교 안에서 혼자 남겨진 느낌이 들어 도움을 요청하기 어렵다." },
      { id: 24, text: "문항 24: 불안, 우울, 수면문제 등으로 공부를 지속하기 어렵다." },
      { id: 25, text: "문항 25: 학교생활을 생각하면 기대감보다 걱정과 압박감이 더 크다." },
      { id: 26, text: "문항 26: 지금은 학업을 밀어붙이기보다 회복할 시간이 필요하다고 느낀다." },
      { id: 27, text: "문항 27: 학교에서 마음 놓고 이야기할 친구나 선배가 부족하다." },
      { id: 28, text: "문항 28: 교수, 조교, 상담센터, 행정부서직원 중 누구에게 도움을 요청해야 할지 잘 모르겠다." },
      { id: 29, text: "문항 29: 이 학교나 학과에 소속되어 있다는 느낌이 약하다." },
      { id: 30, text: "문항 30: 학교의 지원제도가 내 어려움을 해결하기에는 멀고 복잡하게 느껴진다." },
      { id: 31, text: "문항 31: 캠퍼스 생활이나 학과 분위기에 만족하지 못해 학교에 머물고 싶은 마음이 줄어든다." },
      { id: 32, text: "문항 32: 가족의 기대나 압박 때문에 학교를 계속 다니는 것이 더 힘들게 느껴진다." },
      { id: 33, text: "문항 33: 주변 사람이 휴학·자퇴·취업한 사례를 보거나 들으면 마음이 흔들린다." },
      { id: 34, text: "문항 34: 대학을 졸업하지 않아도 성공할 수 있다는 생각이 내 선택에 영향을 준다." },
      { id: 35, text: "문항 35: 가족은 계속 다니길 원하지만, 나는 다른 선택을 해야 할지도 모른다고 느낀다." },
      { id: 36, text: "문항 36: 사회가 학위를 지나치게 중요하게 보지만, 그것이 내 현실 문제를 해결해 주지는 않는다고 느낀다." },
      { id: 37, text: "문항 37: 자퇴를 아직 결정한 것은 아니지만, 오래전부터 계속 고민해 왔다." },
      { id: 38, text: "문항 38: 학교를 떠나는 선택이 실패라기보다 내 상황을 바꾸는 방법일 수 있다고 느낀다." },
      { id: 39, text: "문항 39: 지금 상태가 계속된다면 학교에 남는 것보다 떠나는 것이 내 삶에 더 도움이 될 것 같다." },
      { id: 40, text: "문항 40: 자퇴를 고민하면서 내가 어떤 지원을 받으면 계속 다닐 수 있을지 생각해본 경험이 있다" }
    ];

    /**********************************************************************
     * 2. 내부 상태값
     **********************************************************************/

    const STEP_LABELS = ["안내", "예비분류", "점수선택", "최종확인"];
    const appEl = document.getElementById("app");
    const stepperEl = document.getElementById("stepper");
    const toastEl = document.getElementById("toast");
    const loadingEl = document.getElementById("loading");

    const urlParams = new URLSearchParams(window.location.search);
    const urlUserCode = cleanStudentId(urlParams.get("userCode") || "");

    const state = {
      step: 0,
      startedAt: new Date(),
      stepStartedAt: Date.now(),
      durations: [0, 0, 0, 0, 0, 0],
      studentId: urlUserCode,
      urlUserCode: urlUserCode,
      pre: {
        pool: STATEMENTS.map((s) => s.id),
        disagree: [],
        neutral: [],
        agree: []
      },
      gridInitialized: false,
      placementPool: [],
      grid: {},
      choiceScores: {},
      selectedCardId: null,
      comments: {},
      privacyConsent: false,
      privacyConsentAt: "",
      phoneNumber: "",
      isSubmitting: false,
      submittedAt: null
    };

    /**********************************************************************
     * 3. 공통 유틸
     **********************************************************************/

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function statementById(id) {
      return STATEMENTS.find((s) => Number(s.id) === Number(id));
    }

    function qid(id) {
      return "Q" + String(id).padStart(2, "0");
    }

    function scoreLabel(score) {
      return score > 0 ? "+" + score : String(score);
    }

    function scoreColumnByScore(score) {
      return SCORE_COLUMNS.find((col) => Number(col.score) === Number(score));
    }

    function scoreDescription(score) {
      const col = scoreColumnByScore(score);
      return col && col.description ? col.description : "";
    }

    function scoreLabelWithDescription(score) {
      const label = scoreLabel(Number(score));
      const desc = scoreDescription(Number(score));
      return desc ? label + "점 · " + desc : label + "점";
    }

    function cleanStudentId(value) {
      const text = String(value || "").trim();
      if (!text || text === "---" || text.toLowerCase() === "undefined") return "";
      return text.replace(/[\s-]/g, "");
    }

    function cleanPhoneNumber(value) {
      return String(value || "").replace(/[^0-9]/g, "");
    }

    function formatPhoneForDisplay(value) {
      const digits = cleanPhoneNumber(value);
      if (digits.length === 11) {
        return digits.replace(/(\d{3})(\d{4})(\d{4})/, "$1-$2-$3");
      }
      if (digits.length === 10) {
        return digits.replace(/(\d{3})(\d{3})(\d{4})/, "$1-$2-$3");
      }
      return String(value || "");
    }

    function isValidPhoneNumber(value) {
      const digits = cleanPhoneNumber(value);
      return /^01[0-9]{8,9}$/.test(digits);
    }

    function totalStatementCount() {
      return STATEMENTS.length;
    }

    function totalSlotCount() {
      return SCORE_COLUMNS.reduce((sum, col) => sum + col.count, 0);
    }

    function countBySign(sign) {
      return SCORE_COLUMNS
        .filter((col) => sign === "negative" ? col.score < 0 : sign === "positive" ? col.score > 0 : col.score === 0)
        .reduce((sum, col) => sum + col.count, 0);
    }

    function configuredWebAppUrl() {
      return WEB_APP_URL && !WEB_APP_URL.includes("여기에_") && /^https:\/\/script\.google\.com\//.test(WEB_APP_URL);
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.clearTimeout(showToast._timer);
      showToast._timer = window.setTimeout(() => toastEl.classList.remove("show"), 2800);
    }

    function setLoading(isLoading, message) {
      loadingEl.textContent = message || "처리 중입니다...";
      loadingEl.classList.toggle("show", !!isLoading);
    }

    function recordStepDuration() {
      const now = Date.now();
      state.durations[state.step] += Math.round((now - state.stepStartedAt) / 1000);
      state.stepStartedAt = now;
    }

    function goToStep(nextStep) {
      recordStepDuration();
      state.step = nextStep;
      state.stepStartedAt = Date.now();
      window.scrollTo({ top: 0, behavior: "smooth" });
      render();
    }

    function renderStepper() {
      stepperEl.innerHTML = STEP_LABELS.map((label, idx) => {
        const active = state.step === idx ? "active" : "";
        const divider = idx < STEP_LABELS.length - 1 ? `<span class="step-divider">+</span>` : "";
        return `
          <div class="step-item ${active}">
            <span class="step-num">${idx + 1}</span>
            <span>${escapeHtml(label)}</span>
          </div>
          ${divider}
        `;
      }).join("");
    }

    /**********************************************************************
     * 4. 예비분류 로직
     **********************************************************************/

    const PRE_BUCKET_ORDER = ["disagree", "neutral", "agree"];
    const PRE_BUCKET_META = {
      disagree: {
        label: "비동의 후보",
        shortLabel: "비동의",
        sign: "negative",
        allowedText: "-4~-1",
        help: "예비분류에서 비동의로 분류한 문항은 최종 배치에서 -4, -3, -2, -1 중에서만 선택할 수 있습니다."
      },
      neutral: {
        label: "중립/판단유보 후보",
        shortLabel: "중립",
        sign: "neutral",
        allowedText: "0",
        help: "예비분류에서 중립으로 분류한 문항은 최종 배치에서 0점에만 배치됩니다."
      },
      agree: {
        label: "동의 후보",
        shortLabel: "동의",
        sign: "positive",
        allowedText: "+1~+4",
        help: "예비분류에서 동의로 분류한 문항은 최종 배치에서 +1, +2, +3, +4 중에서만 선택할 수 있습니다."
      }
    };

    function preBucketTarget(bucket) {
      const meta = PRE_BUCKET_META[bucket];
      if (!meta) return 0;
      return countBySign(meta.sign);
    }

    function preBucketCount(bucket) {
      return (state.pre[bucket] || []).length;
    }

    function preBucketRemaining(bucket) {
      return preBucketTarget(bucket) - preBucketCount(bucket);
    }

    function preBucketStatus(bucket) {
      const remaining = preBucketRemaining(bucket);
      if (remaining === 0) return "ok";
      if (remaining < 0) return "over";
      return "warn";
    }

    function preBucketStatusText(bucket) {
      const remaining = preBucketRemaining(bucket);
      if (remaining === 0) return "충족";
      if (remaining < 0) return "초과 " + Math.abs(remaining) + "개";
      return "부족 " + remaining + "개";
    }

    function preBucketOfCard(cardId) {
      const id = Number(cardId);
      for (let i = 0; i < PRE_BUCKET_ORDER.length; i++) {
        const bucket = PRE_BUCKET_ORDER[i];
        if ((state.pre[bucket] || []).some((x) => Number(x) === id)) {
          return bucket;
        }
      }
      return null;
    }

    function allowedScoresForBucket(bucket) {
      const meta = PRE_BUCKET_META[bucket];
      if (!meta) return [];
      return SCORE_COLUMNS
        .filter((col) => {
          if (meta.sign === "negative") return col.score < 0;
          if (meta.sign === "positive") return col.score > 0;
          return col.score === 0;
        })
        .map((col) => col.score);
    }

    function scoreAllowedForBucket(bucket, score) {
      return allowedScoresForBucket(bucket).some((allowed) => Number(allowed) === Number(score));
    }

    function scoreAllowedForCard(cardId, score) {
      if (!LOCK_PLACEMENT_TO_PRE_CLASSIFICATION) return true;
      const bucket = preBucketOfCard(cardId);
      return !!bucket && scoreAllowedForBucket(bucket, score);
    }

    function allowedScoreTextForCard(cardId) {
      const bucket = preBucketOfCard(cardId);
      if (!bucket) return "예비분류 없음";
      return PRE_BUCKET_META[bucket].allowedText;
    }

    function allowedScoreTextForScore(score) {
      if (Number(score) < 0) return "비동의 후보만";
      if (Number(score) > 0) return "동의 후보만";
      return "중립 후보만";
    }

    function isPreComplete() {
      return preCompletedCount() === totalStatementCount() && state.pre.pool.length === 0;
    }

    function isPreCountsExact() {
      return PRE_BUCKET_ORDER.every((bucket) => preBucketRemaining(bucket) === 0);
    }

    function isPreReadyForPlacement() {
      return isPreComplete() && isPreCountsExact();
    }

    function preStatusSummaryHtml() {
      return PRE_BUCKET_ORDER.map((bucket) => {
        const meta = PRE_BUCKET_META[bucket];
        const status = preBucketStatus(bucket);
        return `
          <div class="pre-quota-card ${status}">
            <div><b>${escapeHtml(meta.label)}</b> <span class="range-chip">${escapeHtml(meta.allowedText)}</span></div>
            <div>현재 ${preBucketCount(bucket)}개 / 목표 ${preBucketTarget(bucket)}개</div>
            <div><b>${escapeHtml(preBucketStatusText(bucket))}</b></div>
          </div>
        `;
      }).join("");
    }

    function removeFromPreEverywhere(cardId) {
      ["pool", "disagree", "neutral", "agree"].forEach((bucket) => {
        state.pre[bucket] = state.pre[bucket].filter((id) => Number(id) !== Number(cardId));
      });
    }

    function movePre(cardId, bucket) {
      if (!PRE_BUCKET_META[bucket]) return;

      const currentBucket = preBucketOfCard(cardId);
      const movingIntoNewBucket = currentBucket !== bucket;

      if (movingIntoNewBucket && preBucketCount(bucket) >= preBucketTarget(bucket)) {
        showToast(PRE_BUCKET_META[bucket].label + "은 이미 목표 개수 " + preBucketTarget(bucket) + "개를 채웠습니다. 먼저 해당 묶음에서 다른 문항을 다시 분류해 주세요.");
        return;
      }

      removeFromPreEverywhere(cardId);
      state.pre[bucket].push(Number(cardId));
      state.gridInitialized = false;
      render();
    }

    function returnPreToPool(cardId) {
      removeFromPreEverywhere(cardId);
      state.pre.pool.push(Number(cardId));
      state.pre.pool.sort((a, b) => a - b);
      state.gridInitialized = false;
      render();
    }

    function preCompletedCount() {
      return state.pre.disagree.length + state.pre.neutral.length + state.pre.agree.length;
    }

    /**********************************************************************
     * 5. 객관식 점수 선택 로직
     **********************************************************************/

    function initializeGrid() {
      state.grid = {};
      state.placementPool = [];
      state.choiceScores = {};

      // 예비분류에서 중립으로 분류한 문항은 0점으로 자동 기록합니다.
      state.pre.neutral.forEach((id) => {
        state.choiceScores[Number(id)] = 0;
      });

      state.selectedCardId = null;
      state.gridInitialized = true;
    }

    function ensureGridInitialized() {
      if (!state.gridInitialized) initializeGrid();
    }

    function allowedScoresForCard(cardId) {
      if (!LOCK_PLACEMENT_TO_PRE_CLASSIFICATION) {
        return SCORE_COLUMNS.map((col) => col.score);
      }

      const bucket = preBucketOfCard(cardId);
      return allowedScoresForBucket(bucket);
    }

    function choiceScoreOfCard(cardId) {
      const id = Number(cardId);
      const value = state.choiceScores[id];
      return value === undefined || value === null || value === "" ? null : Number(value);
    }

    function setChoiceScore(cardId, score) {
      ensureGridInitialized();
      const id = Number(cardId);
      const nScore = Number(score);
      const current = choiceScoreOfCard(id);

      if (!scoreAllowedForCard(id, nScore)) {
        showToast(qid(id) + "의 예비분류상 선택 가능 점수는 " + allowedScoreTextForCard(id) + "입니다.");
        return;
      }

      // 중립 후보는 0점으로 고정합니다.
      if (preBucketOfCard(id) === "neutral") {
        state.choiceScores[id] = 0;
        showToast(qid(id) + "는 중립 후보이므로 0점으로 기록됩니다.");
        render();
        return;
      }

      // 이미 선택한 점수를 다시 클릭하면 선택 해제합니다.
      if (current === nScore) {
        delete state.choiceScores[id];
        render();
        return;
      }

      const targetRemaining = columnRemaining(nScore);
      if (targetRemaining <= 0) {
        showToast(scoreLabel(nScore) + "점은 이미 목표 개수를 채웠습니다. 다른 문항의 선택을 먼저 바꿔 주세요.");
        return;
      }

      state.choiceScores[id] = nScore;
      render();
    }

    function placedCount() {
      ensureGridInitialized();
      return Object.keys(state.choiceScores)
        .filter((id) => state.choiceScores[id] !== undefined && state.choiceScores[id] !== null && state.choiceScores[id] !== "")
        .length;
    }

    function columnFilled(score) {
      ensureGridInitialized();
      const nScore = Number(score);
      return Object.keys(state.choiceScores)
        .filter((id) => Number(state.choiceScores[id]) === nScore)
        .length;
    }

    function columnRemaining(score) {
      const col = SCORE_COLUMNS.find((c) => Number(c.score) === Number(score));
      return col.count - columnFilled(score);
    }

    function validatePlacement() {
      ensureGridInitialized();
      const scoreMap = buildScoreMap();
      const ids = Object.keys(scoreMap).map((id) => Number(id));

      if (totalSlotCount() !== totalStatementCount()) {
        return { ok: false, message: "강제분포 칸 수와 문항 수가 일치하지 않습니다." };
      }

      if (!isPreReadyForPlacement()) {
        return { ok: false, message: "예비분류 개수가 최종 선택 가능 칸 수와 일치하지 않습니다. 비동의 16개, 중립 8개, 동의 16개로 맞춰 주세요." };
      }

      if (ids.length !== totalStatementCount()) {
        return { ok: false, message: `아직 점수를 선택하지 않은 문항이 ${totalStatementCount() - ids.length}개 있습니다.` };
      }

      const unique = new Set(ids);
      if (unique.size !== totalStatementCount()) {
        return { ok: false, message: "중복 기록된 문항이 있습니다. 새로고침 후 다시 확인해 주세요." };
      }

      for (const s of STATEMENTS) {
        const score = scoreMap[s.id];

        if (score === undefined || score === null || score === "") {
          return { ok: false, message: `${qid(s.id)} 문항의 점수를 선택해 주세요.` };
        }

        if (!scoreAllowedForCard(s.id, score)) {
          return {
            ok: false,
            message: `${qid(s.id)} 문항은 예비분류 결과상 ${allowedScoreTextForCard(s.id)} 범위에서만 선택할 수 있습니다.`
          };
        }
      }

      for (const col of SCORE_COLUMNS) {
        const filled = columnFilled(col.score);
        if (filled !== col.count) {
          return {
            ok: false,
            message: `${scoreLabel(col.score)}점은 정확히 ${col.count}개여야 합니다. 현재 ${filled}개입니다.`
          };
        }
      }

      return { ok: true, message: "ok" };
    }

    function buildScoreMap() {
      ensureGridInitialized();
      const scoreMap = {};

      Object.keys(state.choiceScores).forEach((id) => {
        const score = state.choiceScores[id];
        if (score !== undefined && score !== null && score !== "") {
          scoreMap[Number(id)] = Number(score);
        }
      });

      return scoreMap;
    }

    function sortString() {
      const scoreMap = buildScoreMap();
      return STATEMENTS.map((s) => scoreMap[s.id]).join("|");
    }

    function extremeStatementIds() {
      const scoreMap = buildScoreMap();
      return STATEMENTS
        .filter((s) => scoreMap[s.id] === -4 || scoreMap[s.id] === 4)
        .sort((a, b) => scoreMap[a.id] - scoreMap[b.id] || a.id - b.id)
        .map((s) => s.id);
    }

    /**********************************************************************
     * 6. Google Sheets 제출 로직
     **********************************************************************/

    function saveConsentFieldsFromReview() {
      const consentInput = document.getElementById("privacyConsentInput");
      const phoneInput = document.getElementById("phoneNumberInput");

      if (consentInput) {
        const wasConsent = state.privacyConsent;
        state.privacyConsent = !!consentInput.checked;
        if (!wasConsent && state.privacyConsent && !state.privacyConsentAt) {
          state.privacyConsentAt = new Date().toISOString();
        }
        if (!state.privacyConsent) {
          state.privacyConsentAt = "";
        }
      }

      if (phoneInput) {
        state.phoneNumber = phoneInput.value || "";
      }
    }

    function validateRequiredFinalFields() {
      saveConsentFieldsFromReview();

      if (!state.privacyConsent) {
        return {
          ok: false,
          message: "개인정보 수집·이용 동의는 필수입니다. 동의 여부를 체크해 주세요."
        };
      }

      const phoneDigits = cleanPhoneNumber(state.phoneNumber);
      if (!phoneDigits) {
        return {
          ok: false,
          message: "핸드폰번호를 입력해 주세요. 기념품 수령을 위해 정확하게 기재 필수!"
        };
      }

      if (!isValidPhoneNumber(phoneDigits)) {
        return {
          ok: false,
          message: "핸드폰번호 형식이 올바르지 않습니다. 예: 010-1234-5678 또는 01012345678"
        };
      }

      state.phoneNumber = phoneDigits;
      if (state.privacyConsent && !state.privacyConsentAt) {
        state.privacyConsentAt = new Date().toISOString();
      }

      return { ok: true, message: "ok" };
    }

    function buildPayload(options) {
      const opts = options || {};
      if (opts.recordDuration !== false) {
        recordStepDuration();
      }
      const now = new Date();
      const scoreMap = buildScoreMap();
      const values = STATEMENTS.map((s) => Number(scoreMap[s.id]));
      const npos = values.filter((v) => v > 0).length;
      const nneu = values.filter((v) => v === 0).length;
      const nneg = values.filter((v) => v < 0).length;
      const studentId = cleanStudentId(state.studentId || state.urlUserCode);
      const phoneDigits = cleanPhoneNumber(state.phoneNumber);

      const payload = {
        studyTitle: STUDY_TITLE,
        name: STUDY_TITLE,
        datetime: now.toISOString(),
        localDatetime: now.toLocaleString("ko-KR"),
        studentId: studentId,
        userInputId: studentId,
        urlUserCode: state.urlUserCode || "",
        accessCode: "",
        sort: sortString(),
        npos: String(npos),
        nneu: String(nneu),
        nneg: String(nneg),
        preDisagree: state.pre.disagree.join("|"),
        preNeutral: state.pre.neutral.join("|"),
        preAgree: state.pre.agree.join("|"),
        preRuleMode: LOCK_PLACEMENT_TO_PRE_CLASSIFICATION ? "locked_to_preclassification" : "free_grid",
        placementUiMode: "multiple_choice_click",
        preDisagreeCount: String(state.pre.disagree.length),
        preNeutralCount: String(state.pre.neutral.length),
        preAgreeCount: String(state.pre.agree.length),
        preDisagreeAllowedScores: "-4|-3|-2|-1",
        preNeutralAllowedScores: "0",
        preAgreeAllowedScores: "1|2|3|4",
        userAgent: navigator.userAgent,
        privacyConsent: state.privacyConsent ? "Y" : "N",
        privacyConsentText: "개인정보 수집·이용에 동의합니다.",
        privacyConsentAt: state.privacyConsentAt || "",
        phoneNumber: phoneDigits,
        phoneNumberFormatted: formatPhoneForDisplay(phoneDigits),
        giftContactPhone: phoneDigits,
        form0: studentId,
        form1: state.privacyConsent ? "개인정보 수집·이용 동의" : "",
        form2: phoneDigits
      };

      state.durations.forEach((sec, idx) => {
        payload["dur" + idx] = String(sec || 0);
      });

      Object.keys(state.comments).forEach((id) => {
        payload["comment" + id] = state.comments[id] || "";
      });

      SCORE_COLUMNS.forEach((col) => {
        payload["quota_" + scoreLabel(col.score)] = String(col.count);
        payload["filled_" + scoreLabel(col.score)] = String(columnFilled(col.score));
      });

      // PQMethod 변환을 쉽게 하기 위해 q001~q040 형태도 함께 전송합니다.
      STATEMENTS.forEach((s) => {
        payload["q" + String(s.id).padStart(3, "0")] = String(scoreMap[s.id]);
      });

      payload.submitTransport = SUBMIT_TRANSPORT;
      payload.rawClientJson = JSON.stringify({
        studyTitle: STUDY_TITLE,
        studentId: studentId,
        urlUserCode: state.urlUserCode || "",
        sort: payload.sort,
        pre: state.pre,
        preRuleMode: payload.preRuleMode,
        placementUiMode: payload.placementUiMode,
        choiceScores: state.choiceScores,
        comments: state.comments,
        durations: state.durations,
        submittedAtClient: now.toISOString()
      });

      return payload;
    }

    function buildQuery(params) {
      return Object.keys(params)
        .map((key) => encodeURIComponent(key) + "=" + encodeURIComponent(params[key]))
        .join("&");
    }

    function appendQuery(url, params) {
      const separator = url.indexOf("?") === -1 ? "?" : "&";
      return url + separator + buildQuery(params);
    }

    function checkStudentIdViaJsonp(studentId) {
      return new Promise((resolve, reject) => {
        if (!configuredWebAppUrl()) {
          resolve({ ok: true, exists: false, skipped: true });
          return;
        }

        const callbackName = "qsortDuplicateCheck_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
        const script = document.createElement("script");
        let timer = null;

        function cleanup() {
          if (timer) window.clearTimeout(timer);
          try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[callbackName] = (result) => {
          cleanup();
          resolve(result || { ok: false });
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("duplicate_check_failed"));
        };

        timer = window.setTimeout(() => {
          cleanup();
          reject(new Error("duplicate_check_timeout"));
        }, 10000);

        script.src = appendQuery(WEB_APP_URL, {
          action: "checkStudentId",
          studentId: studentId,
          callback: callbackName,
          _: Date.now()
        });

        document.head.appendChild(script);
      });
    }

    function saveCommentsFromReviewTextareas() {
      document.querySelectorAll("[data-comment-id]").forEach((el) => {
        state.comments[el.dataset.commentId] = el.value || "";
      });
    }

    function saveLocalSubmissionBackup(payload) {
      if (!SAVE_LOCAL_BACKUP_ON_SUBMIT) return;

      try {
        const key = "qsort_backup_" + (payload.studentId || "anonymous") + "_" + Date.now();
        localStorage.setItem(key, JSON.stringify(payload));
        localStorage.setItem("qsort_backup_latest", JSON.stringify(payload));
      } catch (err) {
        console.warn("localStorage backup failed", err);
      }
    }

    function createHiddenInput(name, value) {
      const input = document.createElement("input");
      input.type = "hidden";
      input.name = name;
      input.value = value == null ? "" : String(value);
      return input;
    }

    function postViaHiddenForm(payload) {
      return new Promise((resolve, reject) => {
        if (!configuredWebAppUrl()) {
          reject(new Error("web_app_url_not_configured"));
          return;
        }

        const iframeName = "qsortSubmitFrame_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
        const iframe = document.createElement("iframe");
        const form = document.createElement("form");
        let submitted = false;
        let finished = false;

        function cleanupSoon() {
          window.setTimeout(() => {
            try { form.remove(); } catch (e) {}
            try { iframe.remove(); } catch (e) {}
          }, 1200);
        }

        function finish(result) {
          if (finished) return;
          finished = true;
          window.clearTimeout(timeoutId);
          cleanupSoon();
          resolve(result || { ok: true });
        }

        const timeoutId = window.setTimeout(() => {
          // Google Apps Script 응답은 iframe에서 읽지 않습니다.
          // load 이벤트가 막혀도 POST 요청은 이미 전송되었을 가능성이 높으므로 완료 처리합니다.
          finish({ ok: true, timeoutAssumed: true });
        }, 9000);

        iframe.name = iframeName;
        iframe.id = iframeName;
        iframe.style.display = "none";

        iframe.addEventListener("load", () => {
          if (!submitted) return;
          finish({ ok: true, iframeLoaded: true });
        });

        form.method = "POST";
        form.action = WEB_APP_URL;
        form.target = iframeName;
        form.enctype = "application/x-www-form-urlencoded";
        form.acceptCharset = "UTF-8";
        form.style.display = "none";

        Object.keys(payload).forEach((key) => {
          form.appendChild(createHiddenInput(key, payload[key]));
        });

        document.body.appendChild(iframe);
        document.body.appendChild(form);

        window.setTimeout(() => {
          try {
            submitted = true;
            form.submit();
          } catch (err) {
            window.clearTimeout(timeoutId);
            cleanupSoon();
            reject(err);
          }
        }, 0);
      });
    }

    async function postViaFetchNoCors(payload) {
      const body = new URLSearchParams(payload);
      await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        body: body
      });
      return { ok: true };
    }

    async function submitToGoogleSheets() {
      if (state.isSubmitting) {
        showToast("이미 제출을 처리 중입니다.");
        return;
      }

      saveCommentsFromReviewTextareas();

      const validation = validatePlacement();
      if (!validation.ok) {
        alert(validation.message);
        return;
      }

      const studentId = cleanStudentId(state.studentId || state.urlUserCode);
      state.studentId = studentId;

      if (REQUIRE_STUDENT_ID && !studentId) {
        alert("학번을 입력해 주세요.");
        goToStep(0);
        return;
      }

      const finalFieldsValidation = validateRequiredFinalFields();
      if (!finalFieldsValidation.ok) {
        alert(finalFieldsValidation.message);
        return;
      }

      if (!configuredWebAppUrl()) {
        const proceed = confirm("Google Apps Script URL이 아직 설정되지 않았습니다. 제출 대신 응답 데이터를 JSON 파일로 내려받겠습니까?");
        if (proceed) downloadLocalJson();
        return;
      }

      let payload = null;

      try {
        state.isSubmitting = true;
        setLoading(true, CHECK_DUPLICATE_BEFORE_SUBMIT ? "중복 응답 확인 및 제출 요청 중입니다..." : "제출 요청 중입니다...");

        if (CHECK_DUPLICATE_BEFORE_SUBMIT) {
          let check;
          try {
            check = await checkStudentIdViaJsonp(studentId);
          } catch (checkErr) {
            console.warn("duplicate check skipped because it failed", checkErr);
            const proceed = confirm("학번 중복 확인에 실패했습니다. 그래도 제출을 진행할까요?\n\n중복 차단은 Apps Script doPost 단계에서 한 번 더 처리할 수 있습니다.");
            if (!proceed) return;
          }

          if (check && check.invalid) {
            alert("학번 형식이 올바르지 않습니다.");
            return;
          }

          if (check && check.exists) {
            alert("이미 제출된 학번입니다. 동일 학번으로는 중복 응답할 수 없습니다.");
            return;
          }
        }

        payload = buildPayload({ recordDuration: true });
        saveLocalSubmissionBackup(payload);

        if (SUBMIT_TRANSPORT === "fetch") {
          await postViaFetchNoCors(payload);
        } else {
          await postViaHiddenForm(payload);
        }

        state.submittedAt = new Date();
        goToStep(4);
      } catch (err) {
        console.error(err);
        if (payload) {
          saveLocalSubmissionBackup(payload);
        }
        const backup = confirm("제출 요청 중 브라우저 오류가 발생했습니다. 응답 데이터는 브라우저에 임시 백업했습니다. JSON 백업 파일도 내려받겠습니까?");
        if (backup) downloadLocalJson();
      } finally {
        state.isSubmitting = false;
        setLoading(false);
      }
    }

    function downloadLocalJson() {
      saveCommentsFromReviewTextareas();
      const payload = buildPayload({ recordDuration: false });
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "qsort_response_" + (payload.studentId || "anonymous") + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    /**********************************************************************
     * 7. 화면 렌더링
     **********************************************************************/

    function renderPreMoveButtons(cardId) {
      return `
        <div class="pre-card-actions">
          ${PRE_BUCKET_ORDER.map((bucket) => {
            const meta = PRE_BUCKET_META[bucket];
            const full = preBucketCount(bucket) >= preBucketTarget(bucket);
            const disabled = full ? "disabled" : "";
            const title = full ? `${meta.label} 목표 개수 ${preBucketTarget(bucket)}개를 이미 채웠습니다.` : `${meta.label}로 분류`;
            return `<button class="btn-small" data-pre-move="${bucket}" data-card-id="${cardId}" type="button" ${disabled} title="${escapeHtml(title)}">${escapeHtml(meta.shortLabel)}</button>`;
          }).join("")}
        </div>
      `;
    }

    function scoreQuotaStatus(score) {
      const col = SCORE_COLUMNS.find((c) => Number(c.score) === Number(score));
      const filled = columnFilled(score);
      if (!col) return "warn";
      return filled === col.count ? "ok" : "warn";
    }

    function renderScoreRuleText(score) {
      return `<div class="locked-rule-note">${escapeHtml(allowedScoreTextForScore(score))}</div>`;
    }

    function renderScoreMeaningLegend(scores, compact) {
      const scoreList = scores && scores.length ? scores : SCORE_COLUMNS.map((col) => col.score);
      const compactClass = compact ? " compact" : "";

      return `
        <div class="score-legend-grid${compactClass}">
          ${scoreList.map((score) => {
            const nScore = Number(score);
            const type = nScore < 0 ? "negative" : nScore > 0 ? "positive" : "neutral";
            return `
              <div class="score-legend-card ${type}">
                <span class="score-num">${escapeHtml(scoreLabel(nScore))}</span>
                <span class="score-desc">${escapeHtml(scoreDescription(nScore))}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderChoiceProgress() {
      return `
        <div class="choice-progress-grid">
          ${SCORE_COLUMNS.map((col) => `
            <div class="choice-progress-cell ${scoreQuotaStatus(col.score)}">
              <span class="score-num">${escapeHtml(scoreLabel(col.score))}</span>
              <span class="score-desc">${escapeHtml(scoreDescription(col.score))}</span>
              현재 ${columnFilled(col.score)} / 목표 ${col.count}<br>
              남은 ${columnRemaining(col.score)}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderChoiceButton(cardId, score) {
      const current = choiceScoreOfCard(cardId);
      const selected = current === Number(score);
      const remaining = columnRemaining(score);
      const disabled = !selected && remaining <= 0 ? "disabled" : "";
      const title = disabled ? `${scoreLabelWithDescription(score)}은 이미 목표 개수를 채웠습니다.` : `${scoreLabelWithDescription(score)} 선택`;

      return `
        <button
          type="button"
          class="choice-btn ${selected ? "selected" : ""}"
          data-choice-card-id="${cardId}"
          data-choice-score="${score}"
          ${disabled}
          title="${escapeHtml(title)}"
        >
          <span class="score-num">${escapeHtml(scoreLabel(score))}</span>
          <span class="score-desc">${escapeHtml(scoreDescription(score))}</span>
          <span class="remain">남은 ${remaining}</span>
        </button>
      `;
    }

    function renderChoiceCard(cardId) {
      const st = statementById(cardId);
      if (!st) return "";

      const allowedScores = allowedScoresForCard(cardId);
      const current = choiceScoreOfCard(cardId);

      return `
        <div class="choice-card" data-choice-card="${st.id}">
          <div class="choice-card-text">
            <div class="qid">${escapeHtml(qid(st.id))}</div>
            <div class="qtext">${escapeHtml(st.text)}</div>
            <div class="locked-rule-note">현재 선택: <b>${current === null ? "미선택" : escapeHtml(scoreLabelWithDescription(current))}</b></div>
          </div>
          <div class="choice-buttons">
            ${allowedScores.map((score) => renderChoiceButton(st.id, score)).join("")}
          </div>
        </div>
      `;
    }

    function renderChoiceSections() {
      return PRE_BUCKET_ORDER.map((bucket) => {
        const meta = PRE_BUCKET_META[bucket];
        const ids = (state.pre[bucket] || []).slice().sort((a, b) => a - b);
        const completed = ids.filter((id) => choiceScoreOfCard(id) !== null).length;

        return `
          <section class="choice-section ${bucket}">
            <div class="choice-section-head">
              <div>
                <h3>${escapeHtml(meta.label)}</h3>
                <p class="muted">선택 가능 점수: <span class="range-chip">${escapeHtml(meta.allowedText)}</span></p>
              </div>
              <span class="badge ${completed === ids.length ? "ok" : "warn"}">${completed}/${ids.length}개 선택</span>
            </div>
            <div class="locked-rule-note" style="margin-bottom:10px;">${renderScoreMeaningLegend(allowedScoresForBucket(bucket), true)}</div>
            ${ids.map((id) => renderChoiceCard(id)).join("")}
          </section>
        `;
      }).join("");
    }

    function renderCard(cardId, options) {
      const st = statementById(cardId);
      const selected = state.selectedCardId === Number(cardId) ? "selected" : "";
      const mode = options && options.mode ? options.mode : "full";
      const draggable = options && options.draggable === false ? "false" : "true";
      const extraClass = options && options.extraClass ? options.extraClass : "";

      if (!st) return "";

      if (mode === "slot") {
        return `
          <div class="slot-card ${selected}" draggable="${draggable}" data-card-id="${st.id}" title="${escapeHtml(st.text)}">
            ${escapeHtml(qid(st.id))}
          </div>
        `;
      }

      return `
        <div class="q-card ${selected} ${extraClass}" draggable="${draggable}" data-card-id="${st.id}">
          <div class="qid">${escapeHtml(qid(st.id))}</div>
          <div class="qtext">${escapeHtml(st.text)}</div>
          ${mode === "pre" ? renderPreMoveButtons(st.id) : ""}

    function startSurvey() {
      const studentIdInput = document.getElementById("studentIdInput");
      const studentId = cleanStudentId((studentIdInput && studentIdInput.value) || state.studentId);
      state.studentId = studentId;

      if (REQUIRE_STUDENT_ID && !studentId) {
        alert("학번을 입력해 주세요.");
        return;
      }

      if (totalSlotCount() !== totalStatementCount()) {
        alert(`강제분포 칸 수(${totalSlotCount()})와 문항 수(${totalStatementCount()})가 일치하지 않습니다. SCORE_COLUMNS 또는 STATEMENTS를 확인하세요.`);
        return;
      }

      goToStep(1);
    }

    function goPlacementStep() {
      if (!isPreComplete()) {
        alert(`아직 예비분류하지 않은 문항이 ${state.pre.pool.length}개 있습니다.`);
        return;
      }

      if (!isPreCountsExact()) {
        alert(`예비분류 개수를 정확히 맞춰 주세요.

비동의: ${preBucketCount("disagree")} / ${preBucketTarget("disagree")}개
중립: ${preBucketCount("neutral")} / ${preBucketTarget("neutral")}개
동의: ${preBucketCount("agree")} / ${preBucketTarget("agree")}개`);
        return;
      }

      ensureGridInitialized();
      goToStep(2);
    }

    function goReviewStep() {
      const validation = validatePlacement();
      if (!validation.ok) {
        alert(validation.message);
        return;
      }
      goToStep(3);
    }

    function resetPlacement() {
      if (!confirm("현재 점수 선택을 모두 초기화하고 예비분류 결과에서 다시 시작할까요?")) return;
      initializeGrid();
      render();
    }

    function resetAll() {
      if (!confirm("모든 응답을 초기화할까요?")) return;
      state.step = 0;
      state.stepStartedAt = Date.now();
      state.durations = [0, 0, 0, 0, 0, 0];
      state.studentId = urlUserCode;
      state.pre = {
        pool: STATEMENTS.map((s) => s.id),
        disagree: [],
        neutral: [],
        agree: []
      };
      state.gridInitialized = false;
      state.placementPool = [];
      state.grid = {};
      state.choiceScores = {};
      state.selectedCardId = null;
      state.comments = {};
      state.privacyConsent = false;
      state.privacyConsentAt = "";
      state.phoneNumber = "";
      render();
      showToast("초기화되었습니다.");
    }

    window.startSurvey = startSurvey;
    window.goToStep = goToStep;
    window.goPlacementStep = goPlacementStep;
    window.goReviewStep = goReviewStep;
    window.resetPlacement = resetPlacement;
    window.resetAll = resetAll;
    window.submitToGoogleSheets = submitToGoogleSheets;
    window.downloadLocalJson = downloadLocalJson;

    /**********************************************************************
     * 10. 시작
     **********************************************************************/

    render();
  </script>
</body>
</html>
